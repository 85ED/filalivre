version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fila_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fila
      MYSQL_USER: fila_user
      MYSQL_PASSWORD: fila_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: fila_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
      PMA_DATABASE: fila
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
